<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SplitView</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0f;
      color: #e8e6e1;
    }

    .header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid #1e1e24;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg { width: 16px; height: 16px; fill: white; }

    .header-text h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.2px;
      color: #f0ede8;
    }

    .header-text p {
      font-size: 11px;
      color: #5a5a6e;
      margin-top: 1px;
    }

    .open-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 14px 18px;
      padding: 10px;
      background: #6366f1;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      width: calc(100% - 36px);
    }

    .open-btn:hover { background: #5558e8; }

    .open-btn svg { width: 15px; height: 15px; }

    .info {
      padding: 0 18px 16px;
    }

    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 0;
      font-size: 12px;
      color: #5a5a6e;
      border-top: 1px solid #1a1a20;
    }

    .info-row:first-child { border-top: none; }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #6366f1;
      margin-top: 4px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 16 16"><rect x="0" y="0" width="7" height="7" rx="1.5"/><rect x="9" y="0" width="7" height="7" rx="1.5"/><rect x="0" y="9" width="7" height="7" rx="1.5"/><rect x="9" y="9" width="7" height="7" rx="1.5"/></svg>
    </div>
    <div class="header-text">
      <h1>SplitView</h1>
      <p>Multi-tab splitscreen viewer</p>
    </div>
  </div>

  <button class="open-btn" id="openBtn">
    <svg viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="1.5">
      <rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/>
      <rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/>
    </svg>
    Open SplitView
  </button>

  <div class="info">
    <div class="info-row"><div class="dot"></div><span>Up to 4 simultaneous sources</span></div>
    <div class="info-row"><div class="dot"></div><span>Multiple split layouts to choose from</span></div>
    <div class="info-row"><div class="dot"></div><span>Capture any tab in this window</span></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
